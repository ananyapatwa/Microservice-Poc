server:
  port: 8088


spring:
  datasource:
    url: jdbc:mysql://localhost:3306/orders_db?createDatabaseIfNotExist=true
    username: root
    password: Ananya
    driver-class-name: com.mysql.cj.jdbc.Driver



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  application:
    name: ORDER-SERVICE


eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
